name: Build and Deploy

on:
  push:
    branches:
      - staging

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ghcr.io/svrampur/erp:latest

      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker login ghcr.io -u ${{ secrets.GHCR_USER }} -p ${{ secrets.GHCR_PAT }}
            IMAGE=ghcr.io/svrampur/erp:latest
            TEST_CONTAINER=erp_healthcheck
            MAIN_CONTAINER=erp
            MAIN_PORT=80
            TEST_PORT=8080
            
            # Pull the latest image
            docker pull $IMAGE
            
            # Run the new image as a test container on a different port
            docker run -d --name $TEST_CONTAINER -p $TEST_PORT:80 $IMAGE
            
            # Wait for a few seconds for the container to start
            sleep 10
            
            # Healthcheck using curl (adjust /health/ or endpoint as needed)
            if curl -Lf http://localhost:$TEST_PORT/health/; then
              echo "Healthcheck passed. Replacing old container."
              docker stop $MAIN_CONTAINER || true
              docker rm $MAIN_CONTAINER || true
              docker stop $TEST_CONTAINER
              docker rm $TEST_CONTAINER
              docker run -d --name $MAIN_CONTAINER -p $MAIN_PORT:80 $IMAGE
            else
              echo "Healthcheck failed. Keeping old container."
              docker logs $TEST_CONTAINER
              docker stop $TEST_CONTAINER
              docker rm $TEST_CONTAINER
              exit 1
            fi