name: Build and Deploy to GHCR

on:
  push:
    branches:
      - main
      - staging

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Generate safe image name
      - name: Generate Image Name
        run: |
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/$REPO" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy container on server
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE=${{ env.IMAGE_NAME }}:latest

            TEST_CONTAINER=fastapi_healthcheck
            MAIN_CONTAINER=fastapi_app

            MAIN_PORT=8000
            TEST_PORT=8080

            echo "Pulling latest image..."
            docker pull $IMAGE

            echo "Removing previous test container if exists..."
            docker rm -f $TEST_CONTAINER || true

            echo "Starting test container..."
            docker run -d --name $TEST_CONTAINER -p $TEST_PORT:8000 $IMAGE

            echo "Waiting for container startup..."
            sleep 10

            echo "Running health check..."
            if curl -Lf http://localhost:$TEST_PORT/health; then
              echo "Healthcheck passed. Deploying new version."

              docker stop $MAIN_CONTAINER || true
              docker rm $MAIN_CONTAINER || true

              docker stop $TEST_CONTAINER
              docker rm $TEST_CONTAINER

              docker run -d \
                --name $MAIN_CONTAINER \
                -p $MAIN_PORT:8000 \
                --restart unless-stopped \
                $IMAGE

              echo "Deployment successful!"

            else
              echo "Healthcheck failed. Keeping old container."

              docker logs $TEST_CONTAINER
              docker stop $TEST_CONTAINER
              docker rm $TEST_CONTAINER

              exit 1
            fi

            echo "Cleaning unused images..."
            docker image prune -f