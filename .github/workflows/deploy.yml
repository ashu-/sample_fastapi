name: Build and Deploy to GHCR

on:
  push:
    branches:
      - main
      - staging

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GHCR using PAT
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_PAT }}

      # Build and push docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ secrets.REPO_USER }}/sample-fastapi:latest
            ghcr.io/${{ secrets.REPO_USER }}/sample-fastapi:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy on server
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE=ghcr.io/${{ secrets.REPO_USER }}/sample-fastapi:latest

            docker login ghcr.io -u ${{ secrets.GHCR_USER }} -p ${{ secrets.GHCR_PAT }}

            TEST_CONTAINER=fastapi_healthcheck
            MAIN_CONTAINER=fastapi_app
            MAIN_PORT=8000
            TEST_PORT=8080

            echo "Pulling latest image..."
            docker pull $IMAGE

            docker rm -f $TEST_CONTAINER || true

            echo "Starting test container..."
            docker run -d --name $TEST_CONTAINER -p $TEST_PORT:8000 $IMAGE

            sleep 10

            if curl -Lf http://localhost:$TEST_PORT/health; then
              echo "Healthcheck passed. Deploying new version."

              docker stop $MAIN_CONTAINER || true
              docker rm $MAIN_CONTAINER || true

              docker stop $TEST_CONTAINER
              docker rm $TEST_CONTAINER

              docker run -d \
                --name $MAIN_CONTAINER \
                -p $MAIN_PORT:8000 \
                --restart unless-stopped \
                $IMAGE

              echo "Deployment successful!"

            else
              echo "Healthcheck failed. Keeping old container."

              docker logs $TEST_CONTAINER
              docker stop $TEST_CONTAINER
              docker rm $TEST_CONTAINER

              exit 1
            fi

            docker image prune -f