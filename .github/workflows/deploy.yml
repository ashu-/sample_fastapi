name: Build and Deploy to GHCR

on:
  push:
    branches:
      - main
      - staging

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and Push
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository }}:latest

      # Deploy
      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

            IMAGE=ghcr.io/${{ github.repository }}:latest
            TEST_CONTAINER=fastapi_healthcheck
            MAIN_CONTAINER=fastapi_app
            MAIN_PORT=8000
            TEST_PORT=8080

            docker pull $IMAGE

            docker run -d --name $TEST_CONTAINER -p $TEST_PORT:8000 $IMAGE

            sleep 10

            if curl -Lf http://localhost:$TEST_PORT/health; then
              echo "Healthcheck passed. Replacing old container."
              docker stop $MAIN_CONTAINER || true
              docker rm $MAIN_CONTAINER || true
              docker stop $TEST_CONTAINER
              docker rm $TEST_CONTAINER
              docker run -d --name $MAIN_CONTAINER -p $MAIN_PORT:8000 --restart unless-stopped $IMAGE
              echo "Deployment successful!"
            else
              echo "Healthcheck failed. Keeping old container."
              docker logs $TEST_CONTAINER
              docker stop $TEST_CONTAINER
              docker rm $TEST_CONTAINER
              exit 1
            fi

            docker image prune -f